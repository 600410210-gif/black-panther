<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Panther: Legacy Restored</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 4px solid #444; box-shadow: 0 0 50px #6c5ce7; border-radius: 15px; background: #050505; }
        .ui-layer { position: absolute; top: 10px; width: 780px; display: flex; justify-content: space-between; align-items: center; pointer-events: none; z-content: 10;}
        .bar-bg { width: 150px; height: 12px; background: #222; border: 1px solid #555; border-radius: 5px; margin-top: 5px; }
        #energyFill { width: 100%; height: 100%; background: #a29bfe; box-shadow: 0 0 10px #a29bfe; }
        #bossHealthFill { width: 100%; height: 100%; background: #ff4757; }
        #msg { position: absolute; font-size: 3rem; color: #d4af37; text-align: center; width: 100%; top: 40%; pointer-events: none; transition: 0.5s; opacity: 0; z-content: 20;}
    </style>
</head>
<body>

    <div id="msg">STAGE 1: JUNGLE</div>
    <div class="ui-layer">
        <div>SCORE: <span id="score">0</span></div>
        <div id="bossUI" style="opacity: 0; text-align: center;">
            KILLMONGER
            <div class="bar-bg"><div id="bossHealthFill"></div></div>
        </div>
        <div style="text-align: right;">
            VIBRANIUM
            <div class="bar-bg"><div id="energyFill"></div></div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800; canvas.height = 400;

let score = 0, energy = 100, stage = 1, frames = 0, isGameOver = false, gameWon = false;
let enemies = [];
let boss = { x: 900, y: 200, w: 50, h: 80, hp: 100, active: false, dy: 2 };
let cagedPanther = { x: 700, y: 280, w: 50, h: 70, active: false };

function drawPill(x, y, w, h, color, accent, hasEars, eyeColor) {
    ctx.save();
    if (hasEars) {
        ctx.fillStyle = color; ctx.beginPath(); ctx.moveTo(x + 5, y + 10); ctx.lineTo(x + 10, y - 12); ctx.lineTo(x + 20, y + 5); ctx.fill();
        ctx.beginPath(); ctx.moveTo(x + w - 5, y + 10); ctx.lineTo(x + w - 10, y - 12); ctx.lineTo(x + w - 20, y + 5); ctx.fill();
    }
    ctx.beginPath(); ctx.roundRect(x, y, w, h, 25); ctx.fillStyle = color; ctx.fill();
    ctx.strokeStyle = accent; ctx.lineWidth = 3; ctx.stroke();
    ctx.fillStyle = eyeColor; ctx.fillRect(x + 10, y + 15, 8, 4); ctx.fillRect(x + w - 18, y + 15, 8, 4);
    ctx.restore();
}

function drawRescuedPanther(x, y) {
    ctx.save();
    ctx.fillStyle = '#4b0082'; // Deep Purple (Image 2)
    ctx.shadowBlur = 15; ctx.shadowColor = '#6c5ce7'; // Spiritual glow
    
    // Custom feline shape (not pill)
    ctx.beginPath();
    ctx.arc(x+25, y+20, 20, 0, Math.PI*2); // Head
    ctx.roundRect(x+5, y+35, 40, 45, 10); // Body
    ctx.fill();
    
    // Sharp Ears
    ctx.beginPath(); ctx.moveTo(x+10, y+5); ctx.lineTo(x+15, y-15); ctx.lineTo(x+25, y+10); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x+40, y+5); ctx.lineTo(x+35, y-15); ctx.lineTo(x+25, y+10); ctx.fill();
    
    // Intense Golden Eyes (from Image 2)
    ctx.fillStyle = '#f1c40f'; 
    ctx.beginPath(); ctx.arc(x+18, y+18, 5, 0, Math.PI*2); ctx.arc(x+32, y+18, 5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

const player = {
    x: 100, y: 300, w: 45, h: 75, dy: 0, jumps: 0, dash: 0,
    update() {
        if (!gameWon) {
            this.y += this.dy;
            if (this.y + this.h < 380) this.dy += 0.8;
            else { this.dy = 0; this.y = 380 - this.h; this.jumps = 0; }
            if (this.dash > 0) { this.dash--; this.x += 12; } else if (this.x > 100) this.x -= 4;
        }

        let color = (stage >= 3) ? '#d4af37' : '#0a0a0a';
        let accent = (stage >= 3) ? '#f1c40f' : '#6c5ce7';
        let eyes = (stage >= 3) ? '#87ceeb' : '#fff';
        drawPill(this.x, this.y, this.w, this.h, color, accent, true, eyes);
    }
};

function gameLoop() {
    if (isGameOver) return;
    frames++;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = (stage === 3) ? '#2c1e05' : '#111'; ctx.fillRect(0, 0, 800, 400);
    ctx.fillStyle = '#222'; ctx.fillRect(0, 380, 800, 20); // Ground

    player.update();

    if (gameWon) {
        enemies = []; // Clear remaining threats
        
        // Show the 3 Panthers together in the center
        showMsg("LEGACY SAVED");
        player.x = 200; player.y = 305; // 1. Golden Panther (Center)
        
        // 2. Rescued Purple Panther (from image 2)
        drawRescuedPanther(400, 305); 
        
        // 3. Classic Black Panther (standing behind you)
        drawPill(300, 290, 45, 75, '#0a0a0a', '#fff', true, '#fff'); // Black Suit (Image 1)
        
        // Disable UI
        document.getElementById('bossUI').style.opacity = 0;
        document.getElementById('energyFill').parentElement.style.opacity = 0;

        return; // End loop but keep drawing
    }

    // Stage Logic
    if (score >= 10 && stage === 1) { stage = 2; showMsg("STAGE 2: CITY"); }
    if (score >= 25 && stage === 2) { 
        stage = 3; boss.active = true; showMsg("VS KILLMONGER");
        document.getElementById('bossUI').style.opacity = 1;
    }

    // Boss Combat
    if (boss.active) {
        boss.x = 600 + Math.sin(frames * 0.05) * 60;
        boss.y += boss.dy; if (boss.y > 280 || boss.y < 50) boss.dy *= -1;
        drawPill(boss.x, boss.y, boss.w, boss.h, '#3d2b1f', '#e67e22', true, 'red');

        if (player.x < boss.x + boss.w && player.x + player.w > boss.x && player.y < boss.y + boss.h && player.y + player.h > boss.y) {
            if (player.dash > 0) { boss.hp -= 3; player.dash = 0; } else endGame("Throne Seized.");
        }
        document.getElementById('bossHealthFill').style.width = boss.hp + "%";
        
        if (boss.hp <= 0) {
            gameWon = true; 
            boss.active = false;
        }
    }

    // Enemy Spawning
    if (frames % 80 === 0 && !boss.active && !gameWon) enemies.push({x: 800, y: 340, w: 40, h: 40});
    enemies.forEach((en, i) => {
        en.x -= (6 + stage); ctx.fillStyle = '#ff4757'; ctx.fillRect(en.x, en.y, en.w, en.h);
        if (player.x < en.x + en.w && player.x + player.w > en.x && player.y < en.y + en.h && player.y + player.h > en.y) {
            if (player.dash > 0) { enemies.splice(i, 1); score += 5; } else endGame("Defeated.");
        }
    });

    if (energy < 100) energy += 0.2;
    document.getElementById('energyFill').style.width = energy + "%";
    document.getElementById('score').innerText = score;
    requestAnimationFrame(gameLoop);
}

function showMsg(txt) {
    const m = document.getElementById('msg'); m.innerText = txt; m.style.opacity = 1;
    setTimeout(() => m.style.opacity = 0, 2000);
}

function endGame(txt) { isGameOver = true; alert(txt); location.reload(); }

window.addEventListener('keydown', e => {
    if (gameWon) return; // Disable controls on win
    if (e.code === 'Space' && player.jumps < 2) { player.dy = -13; player.jumps++; }
    if (e.code === 'ShiftLeft' && energy >= 30) { player.dash = 20; energy -= 30; }
    if (e.key.toLowerCase() === 'e' && energy >= 80) { 
        if (boss.active) boss.hp -= 20;
        enemies = []; energy = 0; ctx.fillStyle = '#a29bfe'; ctx.fillRect(0,0,800,400); 
    }
});

gameLoop();
</script>
</body>
</html>
